name: Playwright Tests
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
  actions: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Restore visual baselines
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data/visual-baselines
          run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow tests.yml --branch main --status success --json databaseId --jq '.[0].databaseId // ""')"
          if [ -n "$run_id" ]; then
            gh run download "$run_id" --repo "$GITHUB_REPOSITORY" --name visual-baselines --dir data/visual-baselines || \
              echo "No visual baseline artifact found on latest successful main run; missing baselines will be generated for this run."
          else
            echo "No published visual baseline artifact found; missing baselines will be generated for this run."
          fi
      - name: Generate missing visual baselines
        run: npm run test:visual -- --update-snapshots=missing || true
      - name: Run tests
        run: npm test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: visual-baselines
          path: data/visual-baselines/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
